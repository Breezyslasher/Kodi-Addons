name: Watch Party tests

on:
  push:
    branches: [ main ]
    paths:
      - 'service.watchparty/**'
      - '.github/workflows/test-watchparty.yml'
  pull_request:
    paths:
      - 'service.watchparty/**'
      - '.github/workflows/test-watchparty.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run tests
        run: python3 -m unittest discover -v service.watchparty/tests
